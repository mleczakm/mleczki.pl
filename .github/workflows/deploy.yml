name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  add-dns:
    name: Dodaj wpisy DNS
    runs-on: ubuntu-latest
    strategy:
      # serialise calls to avoid Cloudflare rate limits
      max-parallel: 1
      matrix:
        ip: ["185.199.108.153", "185.199.109.153", "185.199.110.153", "185.199.111.153"]
    steps:
      - name: Check Cloudflare credentials
        if: ${{ !secrets.CLOUDFLARE_API_TOKEN || !secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "Cloudflare credentials not provided; skipping DNS updates for ${{ matrix.ip }}"

      - name: Create A record for ${{ matrix.ip }}
        if: ${{ secrets.CLOUDFLARE_API_TOKEN && secrets.CLOUDFLARE_ZONE_ID }}
        uses: Bluesboy/create-dns-record@v2.1
        with:
          type: "A"
          name: "mleczki.pl"
          content: ${{ matrix.ip }}
          ttl: 1
          proxied: false
          token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "CloudFlare DNS: Create or Update record (185.199.108.153)"
        if: ${{ secrets.CLOUDFLARE_API_TOKEN && secrets.CLOUDFLARE_ZONE_ID }}
        uses: Bluesboy/create-dns-record@v2.1
        with:
          type: "A"
          name: "mleczki.pl"
          content: "185.199.108.153"
          ttl: 1
          proxied: false
          token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: "CloudFlare DNS: Create or Update record (185.199.109.153)"
        if: ${{ secrets.CLOUDFLARE_API_TOKEN && secrets.CLOUDFLARE_ZONE_ID }}
        uses: Bluesboy/create-dns-record@v2.1
        with:
          type: "A"
          name: "mleczki.pl"
          content: "185.199.109.153"
          ttl: 1
          proxied: false
          token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: "CloudFlare DNS: Create or Update record (185.199.110.153)"
        if: ${{ secrets.CLOUDFLARE_API_TOKEN && secrets.CLOUDFLARE_ZONE_ID }}
        uses: Bluesboy/create-dns-record@v2.1
        with:
          type: "A"
          name: "mleczki.pl"
          content: "185.199.110.153"
          ttl: 1
          proxied: false
          token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: "CloudFlare DNS: Create or Update record (185.199.111.153)"
        if: ${{ secrets.CLOUDFLARE_API_TOKEN && secrets.CLOUDFLARE_ZONE_ID }}
        uses: Bluesboy/create-dns-record@v2.1
        with:
          type: "A"
          name: "mleczki.pl"
          content: "185.199.111.153"
          ttl: 1
          proxied: false
          token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
